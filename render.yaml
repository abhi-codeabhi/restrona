# Render Blueprint — Restorna on Render + Supabase.
#
# ONE backend service (restorna-api) runs every surface over a SHARED store and
# the order-flow saga, so a customer order actually reaches the kitchen, waiter
# and billing. The front-end is a static site that talks to that one API.
#
# Durable: set DATABASE_URL on restorna-api to your Supabase pooler connection
# string (Project Settings → Database → Connection pooling, "Transaction" mode).
# Run infra/migrations 001→002→003→004 in the Supabase SQL editor first.
#
# After first deploy: copy the restorna-api URL into the web service's
# VITE_API_URL, and set restorna-api's ALLOWED_ORIGIN to the restorna-web URL.
services:
  - type: web
    name: restorna-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - { key: APP, value: api }
      # Front-end origin allowed by CORS (set to the restorna-web URL).
      - { key: ALLOWED_ORIGIN, sync: false }
      # Supabase pooler URL → durable Postgres. Leave unset to run in-memory (demo).
      - { key: DATABASE_URL, sync: false }

  # Front-end as a Render Static Site: builds the Vite PWA, serves dist/ from a
  # CDN with SPA rewrite. Set VITE_API_URL (build-time) to the restorna-api URL,
  # and VITE_TENANT_ID to the tenant the public QR resolves to.
  - type: web
    name: restorna-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - { key: VITE_API_URL, sync: false }
      - { key: VITE_TENANT_ID, value: acme }
      # Supabase Auth (OTP). Leave blank to keep every surface open.
      - { key: VITE_SUPABASE_URL, sync: false }
      - { key: VITE_SUPABASE_ANON_KEY, sync: false }
    routes:
      - { type: rewrite, source: /*, destination: /index.html }
