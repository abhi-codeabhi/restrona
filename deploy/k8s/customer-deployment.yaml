apiVersion: apps/v1
kind: Deployment
metadata:
  name: restorna-customer
  namespace: restorna
  labels:
    app.kubernetes.io/name: restorna
    app.kubernetes.io/component: customer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: restorna
      app.kubernetes.io/component: customer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: restorna
        app.kubernetes.io/component: customer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: restorna:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP
              value: customer
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
