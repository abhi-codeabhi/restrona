# Which app this release runs (customer|waiter|kitchen|billing|ordering).
app: customer

image:
  repository: restorna
  tag: latest
  pullPolicy: IfNotPresent

port: 8080
replicas: 2

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

service:
  type: ClusterIP
  port: 80
